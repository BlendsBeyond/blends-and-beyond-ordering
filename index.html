  <style>
    :root { --bg:#f7f3ee; --card:#fff; --text:#26211c; --muted:#70685f; --brand:#004b34; --brand2:#013624; --gold:#f6e7b6; --accent:#d8b88a; --border:#e7ddd1; }
    * { box-sizing: border-box; } body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); }
    header { background:linear-gradient(135deg,var(--brand),var(--brand2)); color:white; padding:24px 18px; text-align:center; }
    .logo { width:110px; height:110px; object-fit:contain; border-radius:50%; display:block; margin:0 auto 12px; }
    header h1 { margin:0 0 8px; font-size:32px; } header p { margin:0; color:var(--gold); }
    .wrap { max-width:980px; margin:0 auto; padding:18px; padding-bottom:150px; }
    .topbar { display:grid; grid-template-columns:1fr; gap:10px; margin:18px 0; }
    input, textarea { width:100%; padding:12px; border:1px solid var(--border); border-radius:10px; font-size:16px; background:white; } textarea { min-height:90px; resize:vertical; }
    .category { margin:22px 0; } .category h2 { font-size:22px; border-bottom:2px solid var(--accent); padding-bottom:8px; color:var(--brand2); }
    .product { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin:10px 0; display:grid; grid-template-columns: 1fr 110px 110px; gap:10px; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.03); }
    .product-name { font-weight:700; } .price { color:var(--brand); font-weight:700; text-align:right; } .qty { max-width:100px; text-align:center; }
    .sticky { position:fixed; left:0; right:0; bottom:0; background:white; border-top:1px solid var(--border); box-shadow:0 -4px 18px rgba(0,0,0,.08); padding:14px 18px; }
    .sticky-inner { max-width:980px; margin:0 auto; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; } .total { font-size:22px; font-weight:800; } .small { color:var(--muted); font-size:13px; }
    button { border:0; background:#25D366; color:white; font-weight:800; padding:14px 18px; border-radius:12px; font-size:16px; cursor:pointer; } button:hover { filter:brightness(.95); } .clear { background:var(--brand); margin-left:8px; }
    @media(max-width:650px) { .logo { width:88px; height:88px; } header h1 { font-size:25px; } .product { grid-template-columns:1fr 80px; } .price { text-align:left; } .qty { grid-column:2; grid-row:1 / span 2; } .sticky-inner { grid-template-columns:1fr; } button { width:100%; } .clear { margin-left:0; margin-top:8px; } }
  </style>

let quantities = {};
function money(n) { return '£' + Number(n).toFixed(2); }
function idFor(cat, name) { return (cat + '|' + name).replace(/[^a-zA-Z0-9]/g, '_'); }
function renderProducts() {
  const container = document.getElementById('products'); const search = document.getElementById('search').value.toLowerCase(); container.innerHTML = '';
  Object.entries(productGroups).forEach(([category, items]) => {
    const filtered = items.filter(p => (p.name + ' ' + category).toLowerCase().includes(search)); if (!filtered.length) return;
    const section = document.createElement('section'); section.className = 'category'; section.innerHTML = `<h2>${category}</h2>`;
    filtered.forEach(p => {
      const id = idFor(category, p.name); const row = document.createElement('div'); row.className = 'product';
      row.innerHTML = `<div class="product-name">${p.name}</div><div class="price">${money(p.price)}</div><input class="qty" type="number" min="0" inputmode="numeric" value="${quantities[id] || ''}" placeholder="Qty">`;
      row.querySelector('.qty').addEventListener('input', function () { quantities[id] = Math.max(0, parseInt(this.value || 0)); updateTotal(); });
      section.appendChild(row);
    });
    container.appendChild(section);
  });
  updateTotal();
}
function getSelected() { const selected = []; Object.entries(productGroups).forEach(([category, items]) => { items.forEach(p => { const id = idFor(category, p.name); const qty = quantities[id] || 0; if (qty > 0) selected.push({ category, name:p.name, price:p.price, qty, lineTotal:qty*p.price }); }); }); return selected; }
function updateTotal() { const selected = getSelected(); const total = selected.reduce((sum, p) => sum + p.lineTotal, 0); document.getElementById('total').textContent = money(total); document.getElementById('itemsCount').textContent = selected.reduce((sum, p) => sum + p.qty, 0); }
function sendWhatsApp() {
  const selected = getSelected(); if (!selected.length) { alert('Please select at least one product.'); return; }
  const staff = document.getElementById('staffName').value.trim();
  if (!staff) {
    alert('Please enter the branch name before sending the order.');
    return;
  } const notes = document.getElementById('notes').value.trim(); const total = selected.reduce((sum, p) => sum + p.lineTotal, 0);
  let msg = `Blends & Beyond Order

Staff/Branch: ${staff}
`; let currentCat = '';
  selected.forEach(p => { if (p.category !== currentCat) { currentCat = p.category; msg += `
${currentCat}
`; } msg += `- ${p.name} x ${p.qty} @ ${money(p.price)} = ${money(p.lineTotal)}
`; });
  msg += `
TOTAL: ${money(total)}`; if (notes) msg += `

Notes: ${notes}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}
function clearOrder() { if(confirm('Clear the order?')) { quantities = {}; document.querySelectorAll('.qty').forEach(i => i.value = ''); updateTotal(); } }
renderProducts();
